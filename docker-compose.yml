services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golingo
      POSTGRES_USER: golingo
      POSTGRES_PASSWORD: golingo
    ports:
      - "5432:5432"
    volumes: # для работы контейнера с опред частями файловой системы
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golingo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
